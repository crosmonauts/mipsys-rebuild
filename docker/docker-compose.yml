services:
  postgres:
    image: postgres:15-alpine
    container_name: mipsys-postgres
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: intern
      POSTGRES_PASSWORD: intern123
      POSTGRES_DB: db_mipsys
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intern -d db_mipsys"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
